<!-- Source for og-image.png. Export this to PNG at 1200x630 before launch and save as og-image.png in this folder. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F1E"/>
      <stop offset="45%" stop-color="#0F4C45"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#E5C77B"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logomark -->
  <g transform="translate(120, 200)">
    <text x="0" y="120" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="300" font-size="160" fill="#FFFFFF">n</text>
    <path d="M120 30 H260 V100 H170 M170 100 L195 80 M170 100 L195 120" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="430" font-family="Fraunces, Georgia, serif" font-weight="500" font-size="64" fill="#FFFFFF" letter-spacing="-1">Newline Therapy</text>

  <!-- Tagline placeholder -->
  <text x="120" y="490" font-family="DM Sans, sans-serif" font-weight="400" font-size="28" fill="#FAF8F3" opacity="0.8">[PLACEHOLDER: Tagline]</text>

  <!-- Gold rule -->
  <rect x="120" y="540" width="120" height="2" fill="url(#gold)"/>
</svg>
